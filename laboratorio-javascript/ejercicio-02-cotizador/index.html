<!DOCTYPE html> 
<html lang="es"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Cotizador de compra</title> 
  <link rel="stylesheet" href="styles.css"> 
  <script src="app.js" defer></script> 
</head> 
<body> 
  <main class="contenedor"> 
    <form id="formCotizador" class="panel"> 
      <p class="etiqueta">Ejercicio 2</p> 
      <h1>Cotizador de compra</h1> 
 
      <label for="producto">Producto</label> 
      <input id="producto" type="text" required> 
 
      <div class="fila"> 
        <div> 
          <label for="precio">Precio unitario</label> 
          <input id="precio" type="number" min="0.01" step="0.01" required> 
        </div> 
        <div> 
          <label for="cantidad">Cantidad</label> 
          <input id="cantidad" type="number" min="1" step="1" required> 
        </div> 
      </div> 
 
      <label for="tipoCliente">Tipo de cliente</label> 
      <select id="tipoCliente"> 
        <option value="regular">Regular</option> 
        <option value="corporativo">Corporativo</option> 
      </select> 
 
      <label class="check"> 
        <input id="esFrecuente" type="checkbox"> 
        Cliente frecuente 
      </label> 
 
      <button type="submit">Calcular cotización</button> 
      <p id="mensajeError" class="error" aria-live="assertive"></p> 
    </form> 
 
    <section class="panel resumen" aria-labelledby="tituloResumen"> 
      <h2 id="tituloResumen">Resumen</h2> 
      <dl> 
        <div><dt>Producto</dt><dd id="resProducto">—</dd></div> 
        <div><dt>Subtotal</dt><dd id="resSubtotal">S/ 0.00</dd></div> 
        <div><dt>Descuento</dt><dd id="resDescuento">S/ 0.00</dd></div> 
        <div><dt>IGV</dt><dd id="resIgv">S/ 0.00</dd></div> 
        <div class="total"><dt>Total</dt><dd id="resTotal">S/ 0.00</dd></div> 
     </dl> 
    </section> 
  </main> 
</body> 
</html>
